<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ExamCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <span class="logo-name">EduTest</span>
  </div>

  <h1>შექმენით მომხმარებელი</h1>
  <p class="subtitle">გაქვს უკვე? <a href="/login">შესვლა</a></p>

  <form id="regForm" autocomplete="off" action="http://localhost:3000/Login" method="POST">
    <div class="field">
      <label for="email">საუტორიზაციო სახელი</label>
      <input id="email" name="specialName" required/>
    </div>

    <div class="field">
      <label for="password" >პაროლი</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="პაროლი" name="password" required/>
        <button type="button" class="pw-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength" id="strength">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <button style="margin-top: 15px;" type="submit" class="btn">შესვლა</button>
  </form>
</div>
</body>
</html>
